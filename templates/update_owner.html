<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Owner | Smart Safe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="logo">SMART SAFE</div>
    <div class="nav-links">
        <a href="/home_ready">Home</a>
        <a href="/project_details">Project Details</a>
    </div>
</nav>

<section class="simple-page">
    <div class="simple-card">
        <h1>Update Owner</h1>
        <p>Old owner data will be deleted and new owner registration will start.</p>

        {% if message %}
            <p style="color:#00e5ff; margin-bottom:20px;">{{ message }}</p>
        {% endif %}

        <img 
            src="{{ url_for('update_owner_video_feed') }}" 
            class="camera-feed"
            alt="Update Owner Camera Feed"
        >

        <br><br>

        <a href="/home_ready" class="btn secondary">Back Home</a>
    </div>
</section>

</body>
</html>
